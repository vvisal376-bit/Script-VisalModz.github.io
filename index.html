<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISAL WEB-TERMUX PRO</title>
    <!-- Standard Terminal UI -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.js"></script>
    <!-- Python Engine -->
    <script src="https://cdn.jsdelivr.net/npm/pyodide@0.23.4/pyodide.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        #terminal-container { width: 100%; height: 100%; }
        .boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            color: #0f0; font-family: 'Courier New', monospace;
        }
        .loading-bar { width: 200px; height: 2px; background: #222; margin-top: 20px; position: relative; }
        .progress { width: 0%; height: 100%; background: #0f0; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="boot" class="boot-screen">
        <pre style="font-size: 8px;">
 __      _______  _____          _      
 \ \    / /_   _|/ ____|   /\   | |     
  \ \  / /  | | | (___    /  \  | |     
   \ \/ /   | |  \___ \  / /\ \ | |     
    \  /   _| |_ ____) |/ ____ \| |____ 
     \/   |_____|_____//_/    \_\______|
        </pre>
        <div id="status">INITIALIZING KERNEL...</div>
        <div class="loading-bar"><div id="progress" class="progress"></div></div>
    </div>

    <div id="terminal-container"></div>

    <script>
        // --- 1. SETUP TERMINAL ---
        const term = new Terminal({
            cursorBlink: true,
            theme: { background: '#000000', foreground: '#00ff00', cursor: '#0f0' },
            fontSize: 13,
            fontFamily: 'Courier New'
        });
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal-container'));
        fitAddon.fit();

        // --- 2. VIRTUAL FILE SYSTEM (VFS) ---
        // Kita simpan file di LocalStorage supaya nggak hilang pas refresh
        let vfs = JSON.parse(localStorage.getItem('visal_vfs')) || {
            '/': { type: 'dir', content: {} },
            '/home': { type: 'dir', content: {} },
            '/home/readme.txt': { type: 'file', content: 'Welcome to Visal Web-Termux.\nUse "vpkg" to install tools.\nUse "python" to run scripts.' }
        };
        let currentPath = '/home';

        function saveVFS() {
            localStorage.setItem('visal_vfs', JSON.stringify(vfs));
        }

        // --- 3. INITIALIZE PYTHON ---
        let pyodide;
        async function boot() {
            const status = document.getElementById('status');
            const progress = document.getElementById('progress');
            
            try {
                status.innerText = "LOADING PYTHON ENGINE (WASM)...";
                progress.style.width = "40%";
                pyodide = await loadPyodide();
                
                status.innerText = "MOUNTING FILE SYSTEM...";
                progress.style.width = "80%";
                
                setTimeout(() => {
                    document.getElementById('boot').style.display = 'none';
                    term.writeln("\x1b[1;32mVISAL WEB-TERMUX PRO [BUILD 2026.03]\x1b[0m");
                    term.writeln("Virtual Environment Ready. No root required.");
                    term.writeln("Type 'help' for internal commands.");
                    prompt();
                }, 500);
            } catch (e) {
                status.innerText = "BOOT FAILED. CHECK INTERNET.";
            }
        }

        // --- 4. COMMAND LOGIC ---
        let inputBuffer = '';
        term.onData(data => {
            const char = data;
            if (char === '\r') { // Enter
                term.writeln('');
                handleCommand(inputBuffer);
                inputBuffer = '';
            } else if (char === '\u007F') { // Backspace
                if (inputBuffer.length > 0) {
                    inputBuffer = inputBuffer.slice(0, -1);
                    term.write('\b \b');
                }
            } else {
                inputBuffer += char;
                term.write(char);
            }
        });

        async function handleCommand(line) {
            const args = line.trim().split(' ');
            const cmd = args[0].toLowerCase();

            switch(cmd) {
                case 'help':
                    term.writeln("Core: ls, cd, mkdir, nano, rm, cat, clear, uname");
                    term.writeln("System: vpkg (Visal Package Manager), python [file]");
                    break;
                case 'ls':
                    const dir = getDir(currentPath);
                    Object.keys(dir.content).forEach(name => {
                        const item = dir.content[name];
                        term.writeln(item.type === 'dir' ? `\x1b[1;34m${name}/\x1b[0m` : name);
                    });
                    break;
                case 'mkdir':
                    if(args[1]) createDir(args[1]);
                    else term.writeln("Usage: mkdir [name]");
                    break;
                case 'cd':
                    if(args[1]) changeDir(args[1]);
                    break;
                case 'cat':
                    if(args[1]) term.writeln(readFile(args[1]) || "File not found.");
                    break;
                case 'nano':
                    if(args[1]) {
                        const content = prompt("Masukkan isi file (Simple Editor):");
                        if(content !== null) createFile(args[1], content);
                    } else term.writeln("Usage: nano [filename]");
                    break;
                case 'uname':
                    term.writeln("Linux Visal-Pro-WASM 5.10.x-android-emulated");
                    break;
                case 'clear':
                    term.clear();
                    break;
                case 'vpkg':
                    handleVPKG(args);
                    break;
                case 'python':
                    if(args[1]) {
                        const code = readFile(args[1]);
                        if(code) await runPython(code);
                        else term.writeln("Error: Script not found.");
                    } else {
                        term.writeln("Python 3.11.2 (WebAssembly Shell)");
                        term.writeln("Type your code directly to test logic.");
                    }
                    break;
                default:
                    if(line.trim() !== "") {
                        // Jika bukan perintah internal, coba jalankan sebagai kode Python instan
                        await runPython(line);
                    }
            }
            prompt();
        }

        // --- 5. HELPER FUNCTIONS (REAL VFS) ---
        function prompt() {
            term.write(`\r\n\x1b[1;32mvisal@termux\x1b[0m:\x1b[1;34m${currentPath}\x1b[0m$ `);
        }

        function getDir(path) {
            let parts = path.split('/').filter(p => p !== "");
            let current = vfs['/'];
            for(let p of parts) {
                current = current.content[p];
            }
            return current;
        }

        function createDir(name) {
            const dir = getDir(currentPath);
            dir.content[name] = { type: 'dir', content: {} };
            saveVFS();
            term.writeln(`Directory '${name}' created.`);
        }

        function createFile(name, content) {
            const dir = getDir(currentPath);
            dir.content[name] = { type: 'file', content: content };
            saveVFS();
            term.writeln(`File '${name}' saved.`);
        }

        function readFile(name) {
            const dir = getDir(currentPath);
            return dir.content[name] ? dir.content[name].content : null;
        }

        function changeDir(name) {
            if(name === '..') {
                if(currentPath !== '/') {
                    let p = currentPath.split('/');
                    p.pop();
                    currentPath = p.join('/') || '/';
                }
            } else {
                const dir = getDir(currentPath);
                if(dir.content[name] && dir.content[name].type === 'dir') {
                    currentPath = (currentPath === '/' ? '' : currentPath) + '/' + name;
                } else {
                    term.writeln("Not a directory.");
                }
            }
        }

        async function runPython(code) {
            try {
                let result = await pyodide.runPythonAsync(code);
                if(result !== undefined) term.writeln(String(result));
            } catch(e) {
                term.writeln(`\x1b[31mPythonError:\x1b[0m ${e.message}`);
            }
        }

        // Simulasi Package Manager
        function handleVPKG(args) {
            if(args[1] === 'install') {
                term.writeln(`[*] Fetching ${args[2]} from Visal Repository...`);
                setTimeout(() => {
                    term.writeln(`[+] Package ${args[2]} installed successfully (VASM-Module).`);
                }, 1000);
            } else {
                term.writeln("Usage: vpkg install [package]");
            }
        }

        window.onload = boot;
        window.onresize = () => fitAddon.fit();
    </script>
</body>
</html>
