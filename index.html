body{

.container{
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));

.card{
background:#000000;
border-radius:12px;
padding:10px;
text-align:center;
cursor:pointer;
transition: all 0.4s ease, transform 0.3s ease;
opacity:0;
transform: translateY(20px);
}

.card.show{
opacity:1;
transform: translateY(0);
}

.card:hover{
transform: translateY(-10px) scale(1.08);
box-shadow:0 8px 20px rgba(252,163,17,0.5);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

.btn{
background:linear-gradient(45deg,#ff4d4d,#ff0000);
border:none;
padding:10px;
margin-top:8px;
border-radius:8px;
font-weight:bold;
color:white;
width:100%;
cursor:pointer;
}

.back{
margin:15px;
padding:10px;
background:#9999;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

footer{

padding:15px;
font-size:14px;
color:#fff1c2;
background:#990000;
}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#9999;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;

color:#fca311;

let heroContainer=document.getElementById("heroList")

function showHeroes(){
heroContainer.innerHTML=""

heroes.forEach(hero=>{
heroContainer.innerHTML+=`
<div class="card" onclick="openHero('${hero.name}')">
<img src="${hero.img}">
<h3>${hero.name}</h3>
</div>
`
})

fadeInCards()
}

function openHero(heroName){

let hero=heroes.find(h=>h.name==heroName)

document.getElementById("title").innerText="Skin "+hero.name

heroContainer.innerHTML=`<button class="back" onclick="showHeroes()">← Kembali</button>`

hero.skins.forEach(skin=>{
heroContainer.innerHTML+=`
<div class="card">
<img src="${skin.img}">
<h3>${skin.name}</h3>
<button class="btn" onclick="download('${skin.link}')">Download</button>
</div>
`
})

fadeInCards()

}

function searchHero(text){

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let name=card.innerText.toLowerCase()

if(name.includes(text.toLowerCase())){
card.style.display="block"
}else{
card.style.display="none"
}

})

}

function fadeInCards(){

const cards=document.querySelectorAll(".card")

cards.forEach((card,index)=>{

setTimeout(()=>{

card.classList.add("show")

},index*150)

})

}

window.addEventListener("load",()=>{

setTimeout(()=>{

document.getElementById("loader").style.display="none"

},1000)

})

function download(link){

if(link==="#"){
alert("File tidak tersedia")
return
}

window.open(link,"_blank")

}

showHeroes()
