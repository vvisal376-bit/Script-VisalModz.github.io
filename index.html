<style>
/* BODY & HEADER */
body{
  margin:0;
  font-family:Arial;
  background:#990000; /* merah */
  color:white;
}

/* HEADER */
header{
  background:#990000; /* merah gelap */
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* SEARCH */
.search{
  padding:15px;
  text-align:center;
}

.search input{
  width:80%;
  padding:10px;
  border:none;
  border-radius:20px;
  outline:none;
  background:#330000;
  color:white;
}

/* HERO LIST */
.container{
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:15px;
}

/* CARD */
.card{
  background:#000000; /* hitam */
  border-radius:12px;
  padding:10px;
  text-align:center;
  cursor:pointer;
  transition: all 0.4s ease, transform 0.3s ease;
  opacity: 0;
  transform: translateY(20px);
}

.card.show{
  opacity:1;
  transform: translateY(0);
}

.card:hover{
  transform: translateY(-10px) scale(1.08);
  box-shadow: 0 8px 20px rgba(252, 163, 17, 0.5);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.btn{
  background:linear-gradient(45deg,#ff4d4d,#ff0000);
  border:none;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  font-weight:bold;
  color:white;
  width:100%;
  cursor:pointer;
}

.back{
  margin:15px;
  padding:10px;
  background:#9999;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  font-size:14px;
  color:#fff1c2;
  background:#990000;
}

/* LOADING SCREEN */
#loader {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#9999;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-size:24px;
  color:#fca311;
  font-weight:bold;
}

let heroContainer=document.getElementById("heroList")

function showHeroes(){
  heroContainer.innerHTML=""
  heroes.forEach(hero=>{
    heroContainer.innerHTML+=`
      <div class="card" onclick="openHero('${hero.name}')">
        <img src="${hero.img}">
        <h3>${hero.name}</h3>
      </div>
    `
  })
  fadeInCards();
}

function openHero(heroName){
  let hero=heroes.find(h=>h.name==heroName)
  document.getElementById("title").innerText="Skin "+hero.name
  heroContainer.innerHTML=`<button class="back" onclick="showHeroes()">← Kembali</button>`
  
  hero.skins.forEach(skin=>{
    heroContainer.innerHTML+=`
      <div class="card">
        <img src="${skin.img}">
        <h3>${skin.name}</h3>
        <button class="btn" onclick="download('${skin.link}')">Download</button>
      </div>
    `
  })
  fadeInCards();
}

function download(link){
  alert("Menyiapkan Script...")
  window.location.href=link
}

function searchHero(text){
  let cards=document.querySelectorAll(".card")
  cards.forEach(card=>{
    let name=card.innerText.toLowerCase()
    if(name.includes(text.toLowerCase())){
      card.style.display="block"
    }else{
      card.style.display="none"
    }
  })
}

function fadeInCards() {
  const cards = document.querySelectorAll(".card");
  cards.forEach((card, index) => {
    setTimeout(() => {
      card.classList.add("show");
    }, index * 150);
  });
}

window.addEventListener("load", () => {
  const loader = document.getElementById("loader");
  setTimeout(() => {
    loader.style.display = "none";
  }, 1000);
});

showHeroes()
